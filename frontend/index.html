<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Pedestrian Analysis</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Map (full-screen base layer, pattern from trip) -->
  <div id="map"></div>

  <!-- Floating control panel -->
  <div id="panel" class="panel">
    <div class="panel-header">
      <h1>NYC Pedestrian Analysis</h1>
      <button id="panel-toggle" class="panel-toggle" aria-label="Toggle panel">&laquo;</button>
    </div>

    <div class="panel-body">
      <!-- Layer toggles -->
      <section class="panel-section">
        <h2>Layers</h2>
        <label><input type="checkbox" id="layer-stations" checked /> Count Stations</label>
        <label><input type="checkbox" id="layer-safety" /> Safety Incidents</label>
        <label><input type="checkbox" id="layer-heatmap" /> Incident Heatmap</label>
      </section>

      <!-- Borough filter (pattern from trip: quick filter buttons) -->
      <section class="panel-section">
        <h2>Borough</h2>
        <div class="filter-buttons" id="borough-filters">
          <button class="filter-btn active" data-borough="">All</button>
          <button class="filter-btn" data-borough="MANHATTAN">Manhattan</button>
          <button class="filter-btn" data-borough="BROOKLYN">Brooklyn</button>
          <button class="filter-btn" data-borough="QUEENS">Queens</button>
          <button class="filter-btn" data-borough="BRONX">Bronx</button>
          <button class="filter-btn" data-borough="STATEN ISLAND">Staten Island</button>
        </div>
      </section>

      <!-- Date range filter -->
      <section class="panel-section">
        <h2>Date Range</h2>
        <div class="date-inputs">
          <input type="date" id="filter-start" />
          <span>to</span>
          <input type="date" id="filter-end" />
        </div>
        <button id="apply-filters" class="btn-primary">Apply Filters</button>
      </section>

      <!-- Station info (shows on marker click) -->
      <section class="panel-section" id="station-detail" style="display:none;">
        <h2 id="detail-name"></h2>
        <div id="detail-body"></div>
      </section>

      <!-- Stats summary -->
      <section class="panel-section">
        <h2>Summary</h2>
        <div id="summary-stats">Loading...</div>
      </section>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
