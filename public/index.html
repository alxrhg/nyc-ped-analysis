            // Fetch and display Pedestrian Demand data from NYC Open Data (Lower Manhattan only)
            (function() {
                // Bounding box for Lower Manhattan study area (faster load)
                const lowerManhattanFilter = encodeURIComponent("within_box(the_geom, 40.74, -74.025, 40.695, -73.97)");
                const pedDemandUrl = `https://data.cityofnewyork.us/resource/fwpa-qxaf.geojson?$limit=10000&$where=${lowerManhattanFilter}`;
                const pedDemandLayer = L.layerGroup();
                layer_control_abb36583e30463beba0760ac9b72152e.addOverlay(pedDemandLayer, "Pedestrian Demand");

                // Style function with color + weight encoding (low = thin/grey, high = thick/red)
                function getDemandStyle(value, min, max) {
                    if (value === null || value === undefined || isNaN(value)) {
                        return { color: '#d9d9d9', weight: 1, opacity: 0.3 };
                    }
                    const ratio = Math.min(1, Math.max(0, (value - min) / (max - min)));

                    if (ratio < 0.25) return { color: '#d9d9d9', weight: 1, opacity: 0.4 };      // Low - light grey, thin
                    else if (ratio < 0.5) return { color: '#fdb863', weight: 2, opacity: 0.8 };  // Medium - orange-yellow
                    else if (ratio < 0.75) return { color: '#e08214', weight: 3, opacity: 0.9 }; // High - dark orange
                    else return { color: '#b2182b', weight: 5, opacity: 1.0 };                   // Very High - dark red, thick
                }

                // Focus streets in study area get extra emphasis
                const focusStreets = new Set(['BROADWAY', 'LAFAYETTE ST', 'CANAL ST', 'MOTT ST', 'MULBERRY ST', 'BOWERY', 'CENTRE ST', 'BAXTER ST', 'ELIZABETH ST', 'CHRYSTIE ST', 'FORSYTH ST', 'ELDRIDGE ST', 'ALLEN ST', 'ORCHARD ST', 'LUDLOW ST', 'ESSEX ST', 'HOUSTON ST', 'GRAND ST', 'BROOME ST', 'SPRING ST', 'PRINCE ST', 'WORTH ST', 'WALKER ST', 'WHITE ST', 'LEONARD ST', 'FRANKLIN ST', 'CHAMBERS ST', 'WALL ST', 'NASSAU ST', 'FULTON ST', 'LIBERTY ST', 'VESEY ST', 'CHURCH ST', 'WEST ST']);

                // Add legend
                const legend = L.control({position: 'bottomright'});
                legend.onAdd = function(map) {
                    const div = L.DomUtil.create('div', 'info legend');
                    div.style.cssText = 'background:white;padding:12px 15px;border-radius:5px;box-shadow:0 0 15px rgba(0,0,0,0.2);font-family:sans-serif;';
                    div.innerHTML = `
                        <h4 style="margin:0 0 10px 0;font-size:13px;font-weight:600;">NYC DOT Pedestrian<br>Demand Index</h4>
                        <div style="display:flex;align-items:center;margin:4px 0;"><span style="background:#d9d9d9;width:20px;height:2px;display:inline-block;margin-right:8px;"></span> Low</div>
                        <div style="display:flex;align-items:center;margin:4px 0;"><span style="background:#fdb863;width:20px;height:4px;display:inline-block;margin-right:8px;"></span> Medium</div>
                        <div style="display:flex;align-items:center;margin:4px 0;"><span style="background:#e08214;width:20px;height:6px;display:inline-block;margin-right:8px;"></span> High</div>
                        <div style="display:flex;align-items:center;margin:4px 0;"><span style="background:#b2182b;width:20px;height:8px;display:inline-block;margin-right:8px;"></span> Very High</div>
                    `;
                    return div;
                };
                legend.addTo(map_2a0b713fb2e5989439fa180b01acfc77);

                // Loading indicator
                const loadingDiv = document.createElement('div');
                loadingDiv.style.cssText = 'position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:5px;z-index:9999;';
                loadingDiv.textContent = 'Loading pedestrian demand data...';
                document.body.appendChild(loadingDiv);

                fetch(pedDemandUrl)
                    .then(r => r.json())
                    .then(data => {
                        console.log('Data loaded:', data.features?.length, 'features');
                        console.log('Sample properties:', data.features?.[0]?.properties);

                        // Find the demand value field and calculate min/max
                        const demandFields = ['ped_demand', 'demand', 'pedestrian_demand', 'total_ped', 'ped_vol'];
                        let demandField = null;
                        let minVal = Infinity, maxVal = -Infinity;

                        // Auto-detect the demand field
                        if (data.features && data.features.length > 0) {
                            const props = data.features[0].properties;
                            for (let key in props) {
                                if (typeof props[key] === 'number' || !isNaN(parseFloat(props[key]))) {
                                    const keyLower = key.toLowerCase();
                                    if (keyLower.includes('ped') || keyLower.includes('demand') || keyLower.includes('volume')) {
                                        demandField = key;
                                        break;
                                    }
                                }
                            }
                            // Fallback: use first numeric field
                            if (!demandField) {
                                for (let key in props) {
                                    if (typeof props[key] === 'number' || !isNaN(parseFloat(props[key]))) {
                                        demandField = key;
                                        break;
                                    }
                                }
                            }

                            // Calculate min/max
                            if (demandField) {
                                data.features.forEach(f => {
                                    const val = parseFloat(f.properties[demandField]);
                                    if (!isNaN(val)) {
                                        minVal = Math.min(minVal, val);
                                        maxVal = Math.max(maxVal, val);
                                    }
                                });
                            }
                        }
                        console.log('Demand field:', demandField, 'Range:', minVal, '-', maxVal);

                        const geojsonLayer = L.geoJSON(data, {
                            style: function(feature) {
                                const val = demandField ? parseFloat(feature.properties[demandField]) : 0;
                                const baseStyle = getDemandStyle(val, minVal, maxVal);

                                // Boost focus streets in study area
                                const streetName = (feature.properties.street || feature.properties.streetname || feature.properties.name || '').toUpperCase();
                                if (focusStreets.has(streetName)) {
                                    baseStyle.weight += 1;
                                    baseStyle.opacity = Math.min(1, baseStyle.opacity + 0.1);
                                }

                                return {
                                    color: baseStyle.color,
                                    weight: baseStyle.weight,
                                    opacity: baseStyle.opacity,
                                    fillColor: baseStyle.color,
                                    fillOpacity: baseStyle.opacity * 0.5
                                };
                            },
                            pointToLayer: function(feature, latlng) {
                                const val = demandField ? parseFloat(feature.properties[demandField]) : 0;
                                const style = getDemandStyle(val, minVal, maxVal);
                                return L.circleMarker(latlng, {
                                    radius: Math.max(3, style.weight * 2),
                                    fillColor: style.color,
                                    color: '#333',
                                    weight: 1,
                                    opacity: style.opacity,
                                    fillOpacity: style.opacity * 0.8
                                });
                            },
                            onEachFeature: function(feature, layer) {
                                const p = feature.properties;
                                const val = demandField ? parseFloat(p[demandField]) : 0;
                                const ratio = (val - minVal) / (maxVal - minVal);
                                const category = ratio < 0.25 ? 'Low' : ratio < 0.5 ? 'Medium' : ratio < 0.75 ? 'High' : 'Very High';
                                const streetName = p.street || p.streetname || p.name || p.st_name || 'Unknown';

                                // Store category for filtering
                                layer.demandCategory = category;

                                // Hover tooltip
                                const tooltipHtml = `<b>${streetName}</b><br>Demand: ${category}`;
                                layer.bindTooltip(tooltipHtml, { sticky: true, className: 'demand-tooltip' });

                                // Click popup with details
                                let popupHtml = `<div style="font-family:sans-serif;">
                                    <b style="font-size:14px;">${streetName}</b>
                                    <hr style="margin:5px 0;">
                                    <b>Demand Category:</b> <span style="color:${getDemandStyle(val, minVal, maxVal).color};font-weight:bold;">${category}</span><br>`;
                                if (demandField && p[demandField]) {
                                    popupHtml += `<b>Demand Index:</b> ${p[demandField]}<br>`;
                                }
                                popupHtml += '</div>';
                                layer.bindPopup(popupHtml, {maxWidth: 300});

                                // Click to highlight corridor
                                layer.on('click', function() {
                                    if (window.activeHighlight) {
                                        geojsonLayer.resetStyle(window.activeHighlight);
                                    }
                                    window.activeHighlight = layer;
                                    layer.setStyle({ weight: layer.options.weight + 3, opacity: 1 });
                                    layer.bringToFront();
                                });
                            }
                        });

                        // Store reference for filtering
                        window.demandGeoJson = geojsonLayer;

                        geojsonLayer.addTo(pedDemandLayer);
                        pedDemandLayer.addTo(map_2a0b713fb2e5989439fa180b01acfc77);

                        // Add filter control
                        const filterControl = L.control({position: 'topright'});
                        filterControl.onAdd = function() {
                            const div = L.DomUtil.create('div', 'filter-control');
                            div.style.cssText = 'background:white;padding:10px 12px;border-radius:5px;box-shadow:0 0 15px rgba(0,0,0,0.2);font-family:sans-serif;font-size:12px;margin-top:10px;';
                            div.innerHTML = `
                                <b style="font-size:11px;">Filter by Demand:</b><br>
                                <label style="display:block;margin:3px 0;cursor:pointer;"><input type="checkbox" class="demand-filter" value="Very High" checked> Very High</label>
                                <label style="display:block;margin:3px 0;cursor:pointer;"><input type="checkbox" class="demand-filter" value="High" checked> High</label>
                                <label style="display:block;margin:3px 0;cursor:pointer;"><input type="checkbox" class="demand-filter" value="Medium" checked> Medium</label>
                                <label style="display:block;margin:3px 0;cursor:pointer;"><input type="checkbox" class="demand-filter" value="Low" checked> Low</label>
                            `;
                            L.DomEvent.disableClickPropagation(div);

                            // Filter handler
                            div.addEventListener('change', function(e) {
                                if (e.target.classList.contains('demand-filter')) {
                                    const checked = {};
